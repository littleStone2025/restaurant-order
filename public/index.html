<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>味道鲜 · 在线点单</title>
  <style>
    :root {
      --primary: #e8562a;
      --primary-dark: #c44220;
      --primary-light: #fdf0eb;
      --accent: #f5a623;
      --bg: #f8f7f5;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --text-muted: #888;
      --border: #ebebeb;
      --success: #2ecc71;
      --danger: #e74c3c;
      --shadow: 0 2px 16px rgba(0,0,0,0.08);
      --shadow-hover: 0 6px 28px rgba(232,86,42,0.18);
      --radius: 16px;
      --radius-sm: 8px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* Loading */
    .page-loader {
      position: fixed; inset: 0; background: var(--bg); z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
    }
    .page-loader .spin {
      width: 48px; height: 48px; border: 4px solid var(--border);
      border-top-color: var(--primary); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    .page-loader p { color: var(--text-muted); font-size: 14px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 顶部导航 */
    .navbar {
      position: sticky; top: 0; z-index: 100;
      background: #fff; border-bottom: 1px solid var(--border);
      padding: 0 24px; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .logo { display: flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 700; color: var(--primary); text-decoration: none; }
    .logo-icon { font-size: 28px; }
    .nav-info { display: flex; align-items: center; gap: 6px; color: var(--text-muted); font-size: 14px; }
    .table-badge { background: var(--primary-light); color: var(--primary); padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 13px; }

    /* 主布局 */
    .main-layout {
      max-width: 1200px; margin: 0 auto;
      display: grid; grid-template-columns: 220px 1fr 360px;
      min-height: calc(100vh - 64px);
    }

    /* 左侧分类栏 */
    .sidebar {
      background: #fff; border-right: 1px solid var(--border); padding: 20px 0;
      position: sticky; top: 64px; height: calc(100vh - 64px); overflow-y: auto;
    }
    .sidebar::-webkit-scrollbar { width: 4px; }
    .sidebar::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .sidebar-title { font-size: 11px; font-weight: 600; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; padding: 0 18px 12px; }
    .cat-item {
      display: flex; align-items: center; gap: 10px; padding: 12px 18px;
      cursor: pointer; border-left: 3px solid transparent; transition: all 0.2s; font-size: 14px;
    }
    .cat-item:hover { background: var(--primary-light); color: var(--primary); }
    .cat-item.active { background: var(--primary-light); border-left-color: var(--primary); color: var(--primary); font-weight: 600; }
    .cat-emoji { font-size: 20px; width: 28px; text-align: center; }
    .cat-count { margin-left: auto; font-size: 11px; color: var(--text-muted); background: #f0f0f0; padding: 2px 7px; border-radius: 10px; }
    .cat-item.active .cat-count { background: rgba(232,86,42,0.15); color: var(--primary); }

    /* 中间菜单区 */
    .menu-area { padding: 24px; overflow-y: auto; height: calc(100vh - 64px); }
    .menu-area::-webkit-scrollbar { width: 4px; }
    .menu-area::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .menu-search {
      display: flex; align-items: center; background: #fff;
      border: 1.5px solid var(--border); border-radius: 12px; padding: 10px 16px; gap: 10px; margin-bottom: 20px;
    }
    .menu-search:focus-within { border-color: var(--primary); }
    .menu-search input { border: none; outline: none; flex: 1; font-size: 14px; color: var(--text); background: transparent; }
    .section-title { font-size: 20px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, var(--border), transparent); margin-left: 8px; }
    .dish-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 16px; margin-bottom: 32px; }

    .dish-card {
      background: var(--card-bg); border-radius: var(--radius); overflow: hidden;
      box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; cursor: pointer; position: relative;
    }
    .dish-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-hover); }
    .dish-img-wrap { position: relative; width: 100%; padding-top: 72%; overflow: hidden; }
    .dish-img {
      position: absolute; inset: 0; width: 100%; height: 100%;
      object-fit: cover; display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #ffecd2, #fcb69f); font-size: 56px;
    }
    .dish-badge { position: absolute; top: 8px; left: 8px; background: var(--primary); color: #fff; font-size: 11px; font-weight: 600; padding: 3px 8px; border-radius: 20px; }
    .dish-badge.hot { background: #e74c3c; }
    .dish-badge.new { background: #27ae60; }
    .dish-badge.rec { background: var(--accent); }
    .dish-info { padding: 12px; }
    .dish-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .dish-desc {
      font-size: 12px; color: var(--text-muted); margin-bottom: 10px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      line-height: 1.5; min-height: 36px;
    }
    .dish-footer { display: flex; align-items: center; justify-content: space-between; }
    .dish-price { font-size: 18px; font-weight: 700; color: var(--primary); }
    .dish-price span { font-size: 12px; font-weight: 400; }
    .qty-control { display: flex; align-items: center; gap: 6px; }
    .qty-btn { width: 28px; height: 28px; border-radius: 50%; border: none; cursor: pointer; font-size: 16px; font-weight: 700; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; }
    .qty-btn:active { transform: scale(0.9); }
    .qty-btn.minus { background: #f0f0f0; color: var(--text-muted); }
    .qty-btn.plus { background: var(--primary); color: #fff; }
    .qty-btn.minus:hover { background: #e0e0e0; }
    .qty-btn.plus:hover { background: var(--primary-dark); }
    .qty-num { font-size: 15px; font-weight: 700; min-width: 20px; text-align: center; }
    .add-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--primary); color: #fff; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s, background 0.2s; }
    .add-btn:hover { background: var(--primary-dark); transform: scale(1.1); }
    .add-btn:active { transform: scale(0.9); }
    .unavailable-overlay {
      position: absolute; inset: 0; background: rgba(255,255,255,0.75);
      display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: var(--text-muted);
      border-radius: var(--radius);
    }

    /* 右侧购物车 */
    .cart-panel { background: #fff; border-left: 1px solid var(--border); display: flex; flex-direction: column; position: sticky; top: 64px; height: calc(100vh - 64px); }
    .cart-header { padding: 20px 20px 14px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .cart-title { font-size: 18px; font-weight: 700; display: flex; align-items: center; gap: 8px; }
    .cart-badge { background: var(--primary); color: #fff; font-size: 12px; font-weight: 700; padding: 2px 8px; border-radius: 20px; min-width: 24px; text-align: center; }
    .cart-clear { color: var(--text-muted); font-size: 13px; cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color 0.2s, background 0.2s; }
    .cart-clear:hover { color: var(--primary); background: var(--primary-light); }
    .cart-items { flex: 1; overflow-y: auto; padding: 12px 20px; }
    .cart-items::-webkit-scrollbar { width: 4px; }
    .cart-items::-webkit-scrollbar-thumb { background: #ddd; border-radius: 4px; }
    .cart-empty { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; color: var(--text-muted); }
    .cart-empty-icon { font-size: 56px; opacity: 0.5; }
    .cart-empty p { font-size: 14px; }
    .cart-item { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); animation: slideIn 0.2s ease; }
    @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
    .cart-item:last-child { border-bottom: none; }
    .cart-item-emoji { font-size: 32px; flex-shrink: 0; }
    .cart-item-info { flex: 1; min-width: 0; }
    .cart-item-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cart-item-price { font-size: 13px; color: var(--primary); font-weight: 600; margin-top: 2px; }
    .cart-item-qty { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .cart-summary { border-top: 1px solid var(--border); padding: 16px 20px; }
    .summary-row { display: flex; justify-content: space-between; font-size: 13px; color: var(--text-muted); margin-bottom: 8px; }
    .summary-row.total { font-size: 17px; font-weight: 700; color: var(--text); margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--border); }
    .summary-row.total .amount { color: var(--primary); font-size: 20px; }
    .cart-note { padding: 0 20px 12px; }
    .cart-note textarea { width: 100%; border: 1.5px solid var(--border); border-radius: 10px; padding: 10px 12px; font-size: 13px; resize: none; font-family: inherit; color: var(--text); outline: none; transition: border-color 0.2s; height: 60px; }
    .cart-note textarea:focus { border-color: var(--primary); }
    .cart-note-label { font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
    .checkout-btn {
      margin: 0 20px 20px; padding: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: #fff; border: none; border-radius: var(--radius);
      font-size: 16px; font-weight: 700; cursor: pointer;
      display: flex; align-items: center; justify-content: center; gap: 8px;
      box-shadow: 0 4px 16px rgba(232,86,42,0.35); transition: opacity 0.2s, transform 0.1s;
    }
    .checkout-btn:hover { opacity: 0.9; }
    .checkout-btn:active { transform: scale(0.98); }
    .checkout-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; opacity: 1; }
    .checkout-btn .loading-spin { width: 18px; height: 18px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .pay-mode-selector { display: flex; gap: 8px; margin-bottom: 12px; }
    .pay-mode-btn { flex: 1; padding: 8px; border: 2px solid var(--border); border-radius: var(--radius-sm); background: #fff; font-size: 13px; cursor: pointer; transition: all 0.2s; text-align: center; }
    .pay-mode-btn.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); font-weight: 600; }
    .pay-mode-btn img { width: 18px; height: 18px; vertical-align: middle; margin-right: 4px; }

    /* 弹窗 */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 200; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.25s; }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal { background: #fff; border-radius: 24px; max-width: 480px; width: 90%; max-height: 88vh; overflow-y: auto; transform: scale(0.92) translateY(20px); transition: transform 0.25s; }
    .modal-overlay.open .modal { transform: scale(1) translateY(0); }
    .modal-dish-img { width: 100%; padding-top: 55%; position: relative; overflow: hidden; border-radius: 24px 24px 0 0; }
    .modal-dish-img-inner { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 100px; background: linear-gradient(135deg, #ffecd2, #fcb69f); }
    .modal-close { position: absolute; top: 14px; right: 14px; width: 36px; height: 36px; border-radius: 50%; background: rgba(255,255,255,0.9); border: none; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; z-index: 1; box-shadow: var(--shadow); }
    .modal-body { padding: 20px 24px 24px; }
    .modal-dish-name { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
    .modal-dish-desc { color: var(--text-muted); font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
    .modal-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .modal-tag { background: #f5f5f5; padding: 4px 12px; border-radius: 20px; font-size: 12px; color: var(--text-muted); }
    .modal-price-row { display: flex; align-items: center; justify-content: space-between; margin-top: 16px; }
    .modal-price { font-size: 26px; font-weight: 700; color: var(--primary); }
    .modal-add-btn { padding: 10px 24px; background: var(--primary); color: #fff; border: none; border-radius: var(--radius); font-size: 15px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .modal-add-btn:hover { background: var(--primary-dark); }

    /* 订单成功 */
    .order-modal-body { text-align: center; padding: 40px 30px; }
    .order-success-icon { font-size: 72px; margin-bottom: 16px; animation: bounce 0.5s; }
    @keyframes bounce { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
    .order-modal-title { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    .order-modal-sub { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
    .order-info-box { background: #f8f7f5; border-radius: var(--radius); padding: 16px 20px; text-align: left; margin-bottom: 20px; }
    .order-info-row { display: flex; justify-content: space-between; font-size: 13px; padding: 4px 0; }
    .order-info-row .val { font-weight: 600; }
    .progress-wrap { background: #f0f0f0; border-radius: 4px; height: 6px; margin: 8px 0 16px; overflow: hidden; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, var(--primary), var(--accent)); border-radius: 4px; transition: width 1s linear; }
    .order-btn-group { display: flex; flex-direction: column; gap: 10px; }
    .order-btn { padding: 12px; border-radius: var(--radius-sm); border: none; font-size: 15px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
    .order-btn.primary { background: var(--primary); color: #fff; }
    .order-btn.outline { background: #fff; color: var(--primary); border: 2px solid var(--primary); }
    .order-btn:hover { opacity: 0.85; }

    /* Toast */
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(80px); background: rgba(26,26,26,0.9); color: #fff; padding: 12px 24px; border-radius: 30px; font-size: 14px; z-index: 300; transition: transform 0.3s; pointer-events: none; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
    .toast.error { background: rgba(231,76,60,0.95); }
    .toast.success { background: rgba(46,204,113,0.95); }

    /* 飞入动画 */
    .fly-item { position: fixed; font-size: 28px; pointer-events: none; z-index: 500; transition: all 0.6s cubic-bezier(0.25, 0.1, 0.25, 1); }

    /* 空状态 */
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
    .empty-state .empty-icon { font-size: 60px; margin-bottom: 16px; }

    /* 支付状态 */
    .pay-status-banner {
      background: var(--primary-light); border: 1.5px solid var(--primary);
      border-radius: var(--radius-sm); padding: 10px 14px; margin-bottom: 12px;
      font-size: 13px; color: var(--primary); display: flex; align-items: center; gap: 8px;
    }
    .pay-status-banner .psb-icon { font-size: 18px; }
    .pay-status-banner.paid { background: #e8f8f0; border-color: #2ecc71; color: #27ae60; }

    @media (max-width: 1024px) { .main-layout { grid-template-columns: 200px 1fr 320px; } }
    @media (max-width: 768px) {
      .main-layout { grid-template-columns: 1fr; }
      .sidebar, .cart-panel { position: fixed; top: auto; height: auto; z-index: 50; }
      .sidebar { bottom: 60px; left: 0; right: 0; display: flex; flex-direction: row; overflow-x: auto; overflow-y: hidden; background: #fff; border-top: 1px solid var(--border); padding: 8px 12px; height: 60px; }
      .sidebar-title { display: none; }
      .cat-item { flex-direction: column; gap: 2px; padding: 6px 14px; font-size: 11px; white-space: nowrap; border-left: none; border-bottom: 3px solid transparent; }
      .cat-item.active { border-bottom-color: var(--primary); border-left: none; }
      .cat-count { display: none; }
      .cart-panel { display: none; }
      .menu-area { height: calc(100vh - 64px - 60px); }
    }
  </style>
</head>
<body>

<!-- 加载中 -->
<div class="page-loader" id="pageLoader">
  <div class="spin"></div>
  <p>正在加载菜单...</p>
</div>

<!-- 顶部导航 -->
<nav class="navbar">
  <a class="logo" href="#"><span class="logo-icon">🍜</span>味道鲜餐厅</a>
  <div class="nav-info">
    <span class="table-badge" id="tableBadge" style="cursor:pointer" title="点击切换桌号">
      🪑 <span id="tableNoDisplay">3号桌</span> ▾
    </span>
  </div>
</nav>

<!-- 桌号选择弹窗 -->
<div id="tableModal" style="display:none;position:fixed;inset:0;z-index:9998;background:rgba(0,0,0,0.5);align-items:center;justify-content:center;">
  <div style="background:#fff;border-radius:16px;padding:24px;width:280px;text-align:center;">
    <div style="font-size:16px;font-weight:600;margin-bottom:16px;">请选择您的桌号</div>
    <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;" id="tableGrid"></div>
    <div style="margin-top:16px;">
      <input id="tableInput" type="number" min="1" max="99" placeholder="或输入桌号"
        style="width:80px;padding:8px 12px;border:1px solid #ddd;border-radius:8px;text-align:center;font-size:15px;outline:none;" />
      <button onclick="confirmTable()" style="margin-left:8px;padding:8px 16px;background:#e8562a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-size:14px;">确认</button>
    </div>
    <div style="margin-top:12px;"><button onclick="closeTableModal()" style="background:none;border:none;color:#888;cursor:pointer;font-size:13px;">取消</button></div>
  </div>
</div>

<!-- 主体布局 -->
<div class="main-layout">
  <!-- 左侧分类 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-title">菜品分类</div>
  </aside>

  <!-- 中间菜单 -->
  <main class="menu-area" id="menuArea">
    <div class="menu-search">
      <span>🔍</span>
      <input id="searchInput" type="text" placeholder="搜索菜品名称..." />
    </div>
  </main>

  <!-- 右侧购物车 -->
  <aside class="cart-panel">
    <div class="cart-header">
      <div class="cart-title">🛒 购物车 <span class="cart-badge" id="cartBadge">0</span></div>
      <span class="cart-clear" id="cartClear">清空</span>
    </div>
    <div class="cart-items" id="cartItems">
      <div class="cart-empty">
        <div class="cart-empty-icon">🛍️</div>
        <p>还没有选择菜品哦</p>
      </div>
    </div>
    <div class="pay-status-banner" id="payBanner" style="display:none;margin:0 20px 0">
      <span class="psb-icon">⏳</span><span id="payBannerText">等待支付...</span>
    </div>
    <div class="cart-note">
      <div class="cart-note-label">📝 备注（口味偏好等）</div>
      <textarea id="orderNote" placeholder="如：不要辣、少盐、加饭..."></textarea>
    </div>
    <div class="cart-summary" id="cartSummary">
      <div class="summary-row"><span>菜品合计</span><span id="subTotal">¥0.00</span></div>
      <div class="summary-row"><span>服务费（5%）</span><span id="serviceFee">¥0.00</span></div>
      <div class="summary-row total"><span>实付金额</span><span class="amount" id="totalAmount">¥0.00</span></div>
    </div>
    <button class="checkout-btn" id="checkoutBtn" disabled>
      💳 <span id="checkoutBtnText">确认下单</span>
    </button>
  </aside>
</div>

<!-- 菜品详情弹窗 -->
<div class="modal-overlay" id="dishModal">
  <div class="modal">
    <div class="modal-dish-img">
      <div class="modal-dish-img-inner" id="modalEmoji"></div>
      <button class="modal-close" id="modalClose">✕</button>
    </div>
    <div class="modal-body">
      <div class="modal-dish-name" id="modalName"></div>
      <div class="modal-dish-desc" id="modalDesc"></div>
      <div class="modal-tags" id="modalTags"></div>
      <div class="modal-price-row">
        <div class="modal-price" id="modalPrice"></div>
        <button class="modal-add-btn" id="modalAddBtn">加入购物车</button>
      </div>
    </div>
  </div>
</div>

<!-- 订单弹窗 -->
<div class="modal-overlay" id="orderModal">
  <div class="modal">
    <div class="order-modal-body">
      <div class="order-success-icon" id="orderIcon">🎉</div>
      <div class="order-modal-title" id="orderTitle">下单成功！</div>
      <div class="order-modal-sub" id="orderSub">您的美食正在精心制作中，请耐心等待</div>
      <div class="order-info-box" id="orderInfoBox"></div>

// =========== 工具函数 ===========
function api(path, opts = {}) {
  const controller = new AbortController();
  const timeout = setTimeout(() => controller.abort(), 5000);
  return fetch(API_BASE + path, {
    headers: { 'Content-Type': 'application/json', ...opts.headers },
    signal: controller.signal,
    ...opts,
  }).then(r => { clearTimeout(timeout); return r.json(); })
    .catch(() => { clearTimeout(timeout); return null; });
}

function toast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(t._timer);
  t._timer = setTimeout(() => t.classList.remove('show'), 2200);
}

function flyAnimation(triggerEl) {
  if (!triggerEl) return;
  const rect = triggerEl.getBoundingClientRect();
  const cartRect = document.getElementById('cartBadge').getBoundingClientRect();
  const el = document.createElement('div');
  el.className = 'fly-item';
  el.textContent = '🍽️';
  el.style.left = rect.left + 'px';
  el.style.top = rect.top + 'px';
  document.body.appendChild(el);
  requestAnimationFrame(() => {
    el.style.left = cartRect.left + 'px';
    el.style.top = cartRect.top + 'px';
    el.style.opacity = '0';
    el.style.transform = 'scale(0.4)';
  });
  setTimeout(() => el.remove(), 700);
}

    btn.onclick = () => { tableNo = n; document.getElementById('tableNoDisplay').textContent = n + '号桌'; closeTableModal(); onTableChange(); };

}
function closeTableModal() { document.getElementById('tableModal').style.display = 'none'; }
function confirmTable() {
  const v = parseInt(document.getElementById('tableInput').value);
  if (v && v > 0) { tableNo = v; document.getElementById('tableNoDisplay').textContent = v + '号桌'; closeTableModal(); onTableChange(); }
}

}

async function loadData() {
  try {
    const [catsRes, dishesRes] = await Promise.all([
      api('/categories'),
      api('/dishes?available=1'),
    ]);
    categories = (catsRes && catsRes.code === 0) ? catsRes.data : FALLBACK_CATEGORIES;
    dishes    = (dishesRes && dishesRes.code === 0) ? dishesRes.data : FALLBACK_DISHES;
  } catch (err) {
    console.warn('API 不可用，使用内嵌备用数据', err.message);
    categories = FALLBACK_CATEGORIES;
    dishes      = FALLBACK_DISHES;
  }

  // 恢复购物车
  const savedCart = sessionStorage.getItem('cart_' + tableNo);
  if (savedCart) {
    try { cart = JSON.parse(savedCart); } catch { cart = {}; }
  }
  const savedOrderId = sessionStorage.getItem('pending_order_' + tableNo);
  if (savedOrderId) {
    currentOrderId = savedOrderId;
    checkOrderStatus(savedOrderId); // 静默失败，不阻塞渲染
  }

  renderSidebar();
  renderMenu();
  updateCart();
  document.getElementById('pageLoader').style.display = 'none';
}

// =========== 渲染分类栏 ===========
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const title = document.createElement('div');
  title.className = 'sidebar-title';
  title.textContent = '菜品分类';
  sidebar.innerHTML = '';
  sidebar.appendChild(title);

  categories.forEach(cat => {
    const el = document.createElement('div');
    el.className = 'cat-item' + (cat.id === currentCat ? ' active' : '');
    el.dataset.id = cat.id;
    el.innerHTML = `
      <span class="cat-emoji">${cat.emoji}</span>
      <span>${cat.name}</span>
      <span class="cat-count">${cat.dish_count}</span>
    `;
    el.addEventListener('click', () => {
      currentCat = cat.id;
      renderSidebar();
      renderMenu();
      const sec = document.getElementById('sec-' + cat.id);
      if (sec) sec.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    sidebar.appendChild(el);
  });
}

// =========== 渲染菜单 ===========
function renderMenu() {
  const area = document.getElementById('menuArea');
  const searchBox = area.querySelector('.menu-search');
  area.innerHTML = '';
  area.appendChild(searchBox);

  if (searchQuery) {
    const results = dishes.filter(d =>
      d.name.includes(searchQuery) || (d.description || '').includes(searchQuery) ||
      (d.tags && d.tags.some(t => t.includes(searchQuery)))
    );
    if (results.length === 0) {
      area.innerHTML += `<div class="empty-state"><div class="empty-icon">🔍</div><p>没有找到"${searchQuery}"相关菜品</p></div>`;
    } else {
      area.innerHTML += `<div class="section-title">🔍 搜索结果 <small style="font-size:13px;font-weight:400;color:var(--text-muted)">共 ${results.length} 个</small></div>`;
      area.innerHTML += `<div class="dish-grid">${results.map(renderDishCard).join('')}</div>`;
    }
    bindDishCardEvents();
    return;
  }

  categories.forEach(cat => {
    const catDishes = dishes.filter(d => d.category_id === cat.id);
    if (!catDishes.length) return;

    const section = document.createElement('div');
    section.id = 'sec-' + cat.id;
    section.innerHTML = `
      <div class="section-title">${cat.emoji} ${cat.name}</div>
      <div class="dish-grid">${catDishes.map(r => renderDishCard(r)).join('')}</div>
    `;
    area.appendChild(section);
  });
  bindDishCardEvents();
}

function renderDishCard(dish) {
  const qty = cart[dish.id]?.qty || 0;
  const unavailable = !dish.is_available && !dish.available;
  return `
    <div class="dish-card${unavailable ? ' unavailable' : ''}" data-id="${dish.id}">
      <div class="dish-img-wrap">
        <div class="dish-img">${dish.emoji || '🍽️'}</div>
        ${dish.badge ? `<div class="dish-badge ${dish.badge}">${badgeText(dish.badge)}</div>` : ''}
        ${unavailable ? '<div class="unavailable-overlay">已售罄</div>' : ''}
      </div>
      <div class="dish-info">
        <div class="dish-name">${dish.name}</div>
        <div class="dish-desc">${dish.description || dish.desc || ''}</div>
        <div class="dish-footer">
          <div class="dish-price"><span>¥</span>${dish.price.toFixed(2)}</div>
          ${!unavailable ? `
          <div class="qty-control">
            ${qty > 0
              ? `<button class="qty-btn minus" data-id="${dish.id}">−</button>
                 <span class="qty-num">${qty}</span>
                 <button class="qty-btn plus" data-id="${dish.id}">+</button>`
              : `<button class="add-btn" data-id="${dish.id}">+</button>`
            }
          </div>` : ''}
        </div>
      </div>
    </div>
  `;
}

function badgeText(b) {
  return { hot: '🔥热销', new: '🆕新品', rec: '👍推荐' }[b] || '';
}

function bindDishCardEvents() {
  document.querySelectorAll('.dish-card').forEach(card => {
    const id = parseInt(card.dataset.id);
    card.addEventListener('click', e => {
      if (e.target.closest('button')) return;
      openDishModal(id);
    });
    card.querySelectorAll('.qty-btn.plus, .add-btn').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); const d = dishes.find(x => x.id === id); addToCart(d, btn); });
    });
    card.querySelectorAll('.qty-btn.minus').forEach(btn => {
      btn.addEventListener('click', e => { e.stopPropagation(); removeFromCart(id); });
    });
  });
}

// =========== 购物车 ===========
function addToCart(dish, triggerEl) {
  if (!cart[dish.id]) {
    cart[dish.id] = { id: dish.id, name: dish.name, emoji: dish.emoji, price: dish.price, qty: 0 };
  }
  cart[dish.id].qty++;
  flyAnimation(triggerEl);
  saveCart();
  updateCart();
}

function removeFromCart(dishId) {
  if (!cart[dishId]) return;
  cart[dishId].qty--;
  if (cart[dishId].qty <= 0) delete cart[dishId];
  saveCart();
  updateCart();
}

function clearCart() {
  cart = {};
  payStatus = 'unpaid';
  currentOrderId = null;
  sessionStorage.removeItem('pending_order_' + tableNo);
  saveCart();
  updateCart();
  showPayBanner(false);
  toast('购物车已清空');
}

function saveCart() {
  sessionStorage.setItem('cart_' + tableNo, JSON.stringify(cart));
}

function updateCart() {
  const items = Object.values(cart);
  const totalQty = items.reduce((s, i) => s + i.qty, 0);
  const badge = document.getElementById('cartBadge');
  badge.textContent = totalQty;

  const container = document.getElementById('cartItems');
  if (items.length === 0) {
    container.innerHTML = `<div class="cart-empty"><div class="cart-empty-icon">🛍️</div><p>还没有选择菜品哦</p></div>`;
    document.getElementById('checkoutBtn').disabled = true;
    document.getElementById('checkoutBtnText').textContent = '确认下单';
    updateSummary(0, 0, 0);
    return;
  }

  document.getElementById('checkoutBtn').disabled = payStatus === 'pending';
  container.innerHTML = items.map(item => `
    <div class="cart-item">
      <div class="cart-item-emoji">${item.emoji}</div>
      <div class="cart-item-info">
        <div class="cart-item-name">${item.name}</div>
        <div class="cart-item-price">¥${(item.price * item.qty).toFixed(2)}</div>
      </div>
      <div class="cart-item-qty">
        <button class="qty-btn minus" data-id="${item.id}">−</button>
        <span class="qty-num">${item.qty}</span>
        <button class="qty-btn plus" data-id="${item.id}">+</button>
      </div>
    </div>
  `).join('');

  container.querySelectorAll('.qty-btn.plus').forEach(btn => {
    btn.addEventListener('click', () => { const d = dishes.find(x => x.id === parseInt(btn.dataset.id)); addToCart(d, btn); });
  });
  container.querySelectorAll('.qty-btn.minus').forEach(btn => {
    btn.addEventListener('click', () => removeFromCart(parseInt(btn.dataset.id)));
  });

  const sub = items.reduce((s, i) => s + i.price * i.qty, 0);
  const service = sub * 0.05;
  const total = sub + service;
  updateSummary(sub, service, total);

  // 根据支付状态更新按钮
  if (payStatus === 'pending') {
    document.getElementById('checkoutBtnText').textContent = '⏳ 等待支付...';
  } else if (payStatus === 'paid') {
    document.getElementById('checkoutBtnText').textContent = '✅ 已支付';
  } else {
    document.getElementById('checkoutBtnText').textContent = '💳 去支付 ¥' + total.toFixed(2);
  }
}

function updateSummary(sub, service, total) {
  document.getElementById('subTotal').textContent = '¥' + sub.toFixed(2);
  document.getElementById('serviceFee').textContent = '¥' + service.toFixed(2);
  document.getElementById('totalAmount').textContent = '¥' + total.toFixed(2);
}

// =========== 菜品详情弹窗 ===========
function openDishModal(dishId) {
  const dish = dishes.find(d => d.id === dishId);
  if (!dish) return;
  modalDishId = dishId;
  document.getElementById('modalEmoji').textContent = dish.emoji || '🍽️';
  document.getElementById('modalName').textContent = dish.name;
  document.getElementById('modalDesc').textContent = dish.description;
  document.getElementById('modalPrice').textContent = '¥' + dish.price.toFixed(2);
  document.getElementById('modalTags').innerHTML = (dish.tags || []).map(t => `<span class="modal-tag">${t}</span>`).join('');
  document.getElementById('dishModal').classList.add('open');
}

document.getElementById('modalClose').addEventListener('click', () => document.getElementById('dishModal').classList.remove('open'));
document.getElementById('dishModal').addEventListener('click', e => { if (e.target === document.getElementById('dishModal')) document.getElementById('dishModal').classList.remove('open'); });
document.getElementById('modalAddBtn').addEventListener('click', () => {
  const dish = dishes.find(d => d.id === modalDishId);
  addToCart(dish, document.getElementById('modalAddBtn'));
  document.getElementById('dishModal').classList.remove('open');
  showToast(`✅ 已添加「${dish.name}」到购物车`);
});

function showToast(msg) { toast(msg); }

// =========== 下单 & 支付 ===========
document.getElementById('checkoutBtn').addEventListener('click', handleCheckout);
document.getElementById('cartClear').addEventListener('click', clearCart);

async function handleCheckout() {
  const items = Object.values(cart);
  if (!items.length) return toast('购物车是空的', 'error');
  if (payStatus === 'pending') { toast('订单待支付中，请先完成支付', 'error'); return; }

  // 如果已有订单ID，说明已经创建过订单，直接调起支付
  if (currentOrderId) {
    await requestPayment(currentOrderId);
    return;
  }

  // 创建新订单
  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true;
  document.getElementById('checkoutBtnText').textContent = '⏳ 创建订单...';

  try {
    const orderRes = await api('/orders', {
      method: 'POST',
      body: JSON.stringify({
        table_no: tableNo,
        items: items.map(i => ({ id: i.id, qty: i.qty })),
        note: document.getElementById('orderNote').value.trim(),
      })
    });

    if (orderRes.code !== 0) throw new Error(orderRes.msg);

    currentOrderId = orderRes.data.order_id;
    sessionStorage.setItem('pending_order_' + tableNo, currentOrderId);
    payStatus = 'pending';
    updateCart();
    showPayBanner(true, '⏳ 订单已创建，等待支付...');

    // 调起支付
    await requestPayment(currentOrderId);

  } catch (err) {
    console.error(err);
    toast('下单失败: ' + err.message, 'error');
    btn.disabled = false;
    document.getElementById('checkoutBtnText').textContent = '💳 去支付';
  }
}

async function requestPayment(orderId) {
  const btn = document.getElementById('checkoutBtn');
  btn.disabled = true;
  document.getElementById('checkoutBtnText').textContent = '⏳ 唤起支付...';
  showPayBanner(true, '💳 正在唤起微信支付...');

  try {
    // 优先尝试模拟支付（开发环境）
    let payRes;
    try {
      payRes = await api('/pay/mock/create', {
        method: 'POST',
        body: JSON.stringify({ orderId }),
      });
    } catch {
      // 尝试真实支付
      payRes = await api('/pay/create', {
        method: 'POST',
        body: JSON.stringify({ orderId, openid: '' }),
      });
    }

    if (payRes.code !== 0) throw new Error(payRes.msg);

    payStatus = 'paid';
    sessionStorage.removeItem('pending_order_' + tableNo);
    showPayBanner(true, '✅ 支付成功！');
    updateCart();
    showOrderSuccess(orderId, payRes.data);

  } catch (err) {
    console.error('支付失败:', err);
    btn.disabled = false;
    document.getElementById('checkoutBtnText').textContent = '💳 重试支付';
    showPayBanner(true, '⚠️ 支付失败: ' + err.message);
    toast('支付失败: ' + err.message, 'error');
  }
}

async function checkOrderStatus(orderId) {
  try {
    const res = await api('/orders/' + orderId);
    if (res.code === 0 && res.data) {
      payStatus = res.data.pay_status === 'paid' ? 'paid' : 'unpaid';
      if (payStatus === 'paid') {
        sessionStorage.removeItem('pending_order_' + tableNo);
        showPayBanner(true, '✅ 该订单已支付');
      }
    }
  } catch {}
}

function showPayBanner(show, text = '') {
  const banner = document.getElementById('payBanner');
  if (!show) { banner.style.display = 'none'; return; }
  banner.style.display = 'flex';
  document.getElementById('payBannerText').textContent = text;
  banner.className = 'pay-status-banner' + (text.includes('成功') ? ' paid' : '');
}

function showOrderSuccess(orderId, payData) {
  const items = Object.values(cart);
  const sub = items.reduce((s, i) => s + i.price * i.qty, 0);
  const service = sub * 0.05;
  const total = sub + service;
  const note = document.getElementById('orderNote').value.trim();

  document.getElementById('orderIcon').textContent = '🎉';
  document.getElementById('orderTitle').textContent = '下单成功！';
  document.getElementById('orderSub').textContent = '您的美食正在精心制作中，请耐心等待';
  document.getElementById('orderInfoBox').innerHTML = `
    <div class="order-info-row"><span>订单编号</span><span class="val">${orderId}</span></div>
    <div class="order-info-row"><span>桌号</span><span class="val">${tableNo}号桌</span></div>
    <div class="order-info-row"><span>菜品</span><span class="val" style="max-width:180px;text-align:right;font-size:12px">${items.map(i=>i.name+'×'+i.qty).join('、')}</span></div>
    ${note ? `<div class="order-info-row"><span>备注</span><span class="val">${note}</span></div>` : ''}
    <div class="order-info-row"><span>实付金额</span><span class="val" style="color:var(--primary)">¥${total.toFixed(2)}</span></div>
  `;

  // 进度条
  const bar = document.getElementById('progressBar');
  const label = document.getElementById('progressLabel');
  bar.style.width = '0%';
  setTimeout(() => { bar.style.width = '30%'; label.textContent = '⏳ 厨师已接单，正在备料...'; }, 300);
  setTimeout(() => { bar.style.width = '60%'; label.textContent = '🔥 正在烹饪中，稍等片刻...'; }, 3000);
  setTimeout(() => { bar.style.width = '85%'; label.textContent = '🍽️ 即将出餐，马上就到！'; }, 7000);
  setTimeout(() => { bar.style.width = '100%'; label.textContent = '✅ 菜品已送达，祝您用餐愉快！'; }, 11000);

  // 清空购物车
  cart = {};
  payStatus = 'paid';
  saveCart();
  updateCart();
  document.getElementById('orderModal').classList.add('open');
}

document.getElementById('continueOrder').addEventListener('click', () => {
  document.getElementById('orderModal').classList.remove('open');
  payStatus = 'unpaid';
  currentOrderId = null;
  showPayBanner(false);
  toast('欢迎继续点餐！');
});
document.getElementById('viewOrder').addEventListener('click', () => {
  toast('📋 订单状态已记录，请稍候服务员上菜');
  document.getElementById('orderModal').classList.remove('open');
});

// =========== 搜索 ===========
let searchTimer;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => {
    searchQuery = e.target.value.trim();
    currentCat = null;
    renderSidebar();
    renderMenu();
  }, 200);
});

// =========== 启动 ===========
loadData();
</script>
